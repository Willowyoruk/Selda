<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinner Menu | Selda San Antonio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">

    <style>
        :root {
            --dark-blue: #0F1B2E;
            --gold: #C5A059;
            --cream: #FDFBF7;
            --text-dark: #2F2F2F;
            --text-muted: #666666;
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--cream);
            color: var(--text-dark);
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Fixed Navigation Bar */
        .menu-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 75px;
            background-color: var(--dark-blue);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            box-sizing: border-box;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            z-index: 1000;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            color: var(--gold);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: opacity 0.2s ease;
        }

        .back-btn:hover {
            opacity: 0.8;
        }

        .nav-title {
            color: #ffffff;
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Main Menu Container */
        .menu-container {
            max-width: 1050px;
            margin: 120px auto 60px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .menu-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .menu-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: var(--dark-blue);
            margin: 0 0 10px 0;
        }

        .menu-header p {
            color: var(--gold);
            font-size: 1.1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 0;
            font-weight: 600;
        }

        /* PDF Option Bar */
        .pdf-action-bar {
            background-color: var(--white);
            border: 1px solid rgba(197, 160, 89, 0.25);
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 12px rgba(15, 27, 46, 0.02);
        }

        .pdf-text {
            font-size: 0.95rem;
            color: var(--text-dark);
            margin: 0;
            font-weight: 500;
        }

        .pdf-btn {
            background-color: var(--dark-blue);
            color: var(--white);
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: background-color 0.2s ease, color 0.2s ease;
            border: 1px solid var(--dark-blue);
        }

        .pdf-btn:hover {
            background-color: transparent;
            color: var(--dark-blue);
        }

        /* Menu Sections */
        .menu-section {
            margin-bottom: 50px;
            background: var(--white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(15, 27, 46, 0.03);
            border: 1px solid rgba(197, 160, 89, 0.15);
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--dark-blue);
            margin: 0 0 35px 0;
            text-transform: lowercase;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 8px;
            display: inline-block;
        }

        /* Adaptive Grid System */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            column-gap: 40px;
            row-gap: 40px;
        }

        /* Menu Item Layout with Images */
        .menu-item {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .item-image-wrapper {
            width: 100px;
            height: 100px;
            flex-shrink: 0;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(197, 160, 89, 0.2);
            background-color: #f0f0f0;
        }

        .item-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .menu-item:hover .item-image {
            transform: scale(1.05);
        }

        .item-details {
            flex-grow: 1;
        }

        .item-top-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 6px;
        }

        .item-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--dark-blue);
            margin: 0;
            line-height: 1.3;
        }

        .item-price {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--gold);
            margin: 0;
            padding-left: 15px;
            white-space: nowrap;
        }

        .item-description {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin: 0;
        }

        /* Footer Note */
        .menu-footer-note {
            text-align: center;
            margin-top: 40px;
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Responsive Design */
        @media (max-width: 850px) {
            .menu-grid {
                grid-template-columns: 1fr;
                row-gap: 35px;
            }
        }

        @media (max-width: 480px) {
            .pdf-action-bar {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }
            .menu-section {
                padding: 20px;
            }
            .menu-item {
                gap: 15px;
            }
            .item-image-wrapper {
                width: 85px;
                height: 85px;
            }
            .menu-header h1 {
                font-size: 2.2rem;
            }
            .nav-title {
                display: none;
            }
        }
    </style>
</head>
<body>

    <nav class="menu-nav">
        <a href="index.html" class="back-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px; vertical-align: middle;">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Main Site
        </a>
        <span class="nav-title">Selda San Antonio</span>
        <div style="width: 120px;"></div>
    </nav>

    <div class="menu-container">
        
        <div class="menu-header">
            <h1>Dinner Menu</h1>
            <p>Authentic Mediterranean Cuisine</p>
        </div>

        <div class="pdf-action-bar">
            <p class="pdf-text">Viewable PDF</p>
            <a href="assets/menu.pdf" target="_blank" class="pdf-btn">Open PDF Menu</a>
        </div>

        <div id="live-menu-target"></div>
        
        <p class="menu-footer-note">Selda | San Antonio</p>
    </div>

    <script src="data/menu.js"></script>

    <script>
        const sectionTitles = {
            salads: "salads",
            smallBites: "small bites...",
            aLittleMore: "a little more...",
            fromTheOven: "from the oven",
            desserts: "desserts"
        };

        const targetContainer = document.getElementById('live-menu-target');

        for (const category in menuData) {
            if (menuData.hasOwnProperty(category)) {
                
                const sectionBlock = document.createElement('section');
                sectionBlock.className = 'menu-section';

                const heading = document.createElement('h2');
                heading.className = 'section-title';
                heading.innerText = sectionTitles[category] || category;
                sectionBlock.appendChild(heading);

                const gridBlock = document.createElement('div');
                gridBlock.className = 'menu-grid';

                menuData[category].forEach(item => {
                    const itemElement = document.createElement('div');
                    itemElement.className = 'menu-item';
                    
                    // Standardizes prices smoothly even if standard string structures change slightly
                    const itemPriceDisplay = item.price.includes('$') ? item.price : `$${item.price}`;
                    
                    itemElement.innerHTML = `
                        <div class="item-image-wrapper">
                            <img src="${item.image}" alt="${item.name}" class="item-image" loading="lazy" onerror="this.style.display='none';">
                        </div>
                        <div class="item-details">
                            <div class="item-top-row">
                                <h3 class="item-name">${item.name}</h3>
                                <p class="item-price">${itemPriceDisplay}</p>
                            </div>
                            <p class="item-description">${item.description}</p>
                        </div>
                    `;
                    gridBlock.appendChild(itemElement);
                });

                sectionBlock.appendChild(gridBlock);
                targetContainer.appendChild(sectionBlock);
            }
        }
    </script>
</body>
</html>
