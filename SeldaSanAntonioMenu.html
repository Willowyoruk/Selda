<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinner Menu | Selda San Antonio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">

    <style>
        :root {
            --dark-blue: #0F1B2E;
            --gold: #C5A059;
            --cream: #FDFBF7;
            --text-dark: #2F2F2F;
            --text-muted: #666666;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--cream);
            color: var(--text-dark);
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Fixed Navigation Bar */
        .menu-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 75px;
            background-color: var(--dark-blue);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            box-sizing: border-box;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            z-index: 1000;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            color: var(--gold);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: opacity 0.2s ease;
        }

        .back-btn:hover {
            opacity: 0.8;
        }

        .nav-title {
            color: #ffffff;
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Main Menu Container */
        .menu-container {
            max-width: 1050px;
            margin: 120px auto 60px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .menu-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .menu-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: var(--dark-blue);
            margin: 0 0 10px 0;
        }

        .menu-header p {
            color: var(--gold);
            font-size: 1.1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 0;
            font-weight: 600;
        }

        /* Menu Sections */
        .menu-section {
            margin-bottom: 50px;
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(15, 27, 46, 0.03);
            border: 1px solid rgba(197, 160, 89, 0.15);
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--dark-blue);
            margin: 0 0 30px 0;
            text-transform: lowercase;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 8px;
            display: inline-block;
        }

        /* Adaptive Grid System */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            column-gap: 50px;
            row-gap: 35px;
        }

        /* Menu Item Layout */
        .menu-item {
            display: flex;
            flex-direction: column;
        }

        .item-top-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
        }

        .item-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--dark-blue);
            margin: 0;
        }

        .item-price {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--gold);
            margin: 0;
            padding-left: 15px;
        }

        .item-description {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin: 0;
        }

        /* Footer styling inside the menu page */
        .menu-footer-note {
            text-align: center;
            margin-top: 40px;
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Responsive design adjustments for mobile devices */
        @media (max-width: 768px) {
            .menu-grid {
                grid-template-columns: 1fr;
                row-gap: 30px;
            }
            .menu-section {
                padding: 25px;
            }
            .menu-header h1 {
                font-size: 2.2rem;
            }
            .nav-title {
                display: none; /* Hides center text on small phones to give back button room */
            }
        }
    </style>
</head>
<body>

    <nav class="menu-nav">
        <a href="index.html" class="back-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px; vertical-align: middle;">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Main Site
        </a>
        <span class="nav-title">Selda San Antonio</span>
        <div style="width: 120px;"></div> </nav>

    <div class="menu-container">
        
        <div class="menu-header">
            <h1>Dinner Menu</h1>
            <p>Authentic Mediterranean Cuisine</p>
        </div>

        <div id="live-menu-target"></div>
        
        <p class="menu-footer-note">For parties 6 or above 20% service charge is added on the bills</p>
    </div>

    <script src="data/menu.js"></script>

    <script>
        // Human-friendly section titles map
        const sectionTitles = {
            salads: "salads",
            smallBites: "small bites...",
            aLittleMore: "a little more...",
            fromTheOven: "from the oven",
            desserts: "desserts"
        };

        const targetContainer = document.getElementById('live-menu-target');

        // Loop through categories dynamically to output clean HTML structures
        for (const category in menuData) {
            if (menuData.hasOwnProperty(category)) {
                
                // Create section wrapper element
                const sectionBlock = document.createElement('section');
                sectionBlock.className = 'menu-section';

                // Append Category Heading
                const heading = document.createElement('h2');
                heading.className = 'section-title';
                heading.innerText = sectionTitles[category] || category;
                sectionBlock.appendChild(heading);

                // Create inner items grid block
                const gridBlock = document.createElement('div');
                gridBlock.className = 'menu-grid';

                // Populate grid block with individual item elements
                menuData[category].forEach(item => {
                    const itemElement = document.createElement('div');
                    itemElement.className = 'menu-item';
                    
                    itemElement.innerHTML = `
                        <div class="item-top-row">
                            <h3 class="item-name">${item.name}</h3>
                            <p class="item-price">${item.price.replace('$','')}</p>
                        </div>
                        <p class="item-description">${item.description}</p>
                    `;
                    gridBlock.appendChild(itemElement);
                });

                sectionBlock.appendChild(gridBlock);
                targetContainer.appendChild(sectionBlock);
            }
        }
    </script>
</body>
</html>
