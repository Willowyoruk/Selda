<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic Meta tags telling the web browser how to decode data and scale the page fluidly on mobile screen widths -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selda Mediterranean Kitchen | Dinner Menu</title>
    
    <!-- FAVICON: Renders your custom logo brand image directly onto the browser tab shortcut bar -->
    <link rel="icon" href="assets/IMG_8745.jpeg" type="image/jpeg">

    <!-- GOOGLE STRUCTURED DATA SCHEMA: Explains explicitly to search engine crawling bots that this exact  
         webpage acts as a live restaurant menu, helping generate interactive rich snippets directly in search indexes -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FoodMenu",
      "name": "Selda San Antonio Menu",
      "url": "https://www.seldarestaurant.com/menu",
      "mainEntityOfPage": "https://www.seldarestaurant.com/menu",
      "inLanguage": "en"
    }
    </script>
    
    <!-- FONTS & GRAPHICS: Pre-loading your Google typography families and FontAwesome graphic layout assets -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* RESET OVERRIDES: Clears out default browser spacing behaviors to prevent messy layout shifts */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* THEME STYLE TOKENS: Centralized variable palette holding your exact brand signature colors */
        :root {
            --primary-dark: #111111;
            --velvet-blue: #0A111C;        
            --velvet-blue-surface: #111B29;
            --pure-white: #FFFFFF;
            --muted-white: #BAC4D1;  
            --subtle-gold: #D4AF37;
        }

        /* BODY FRAME: Dictates background properties and typography rendering styles across the viewport canvas */
        body {
            background-color: var(--velvet-blue);
            color: var(--muted-white);
            font-family: 'Lato', sans-serif;
            -webkit-font-smoothing: antialiased;
            line-height: 1.7;
            padding-bottom: 80px;
        }

        /* HEADER WRAPPER: Pinpoints the sticky primary white navigation header strip directly to the top edge when scrolling */
        header {
            background-color: var(--pure-white); 
            padding: 1.2rem 0;
            position: sticky; 
            top: 0;
            z-index: 100; 
            border-bottom: 1px solid #EAEAEA;
        }
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        /* NAVIGATION BUTTON: Formats the elegant back-arrow text returning users to the clean homepage */
        .back-btn {
            display: inline-flex;
            align-items: center;
            color: var(--primary-dark);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.3s ease;
        }
        .back-btn:hover {
            color: var(--subtle-gold);
        }

        /* CANVAS AREA CONTAINERS: Defines widths and alignment margins centering the menu sections evenly */
        .menu-container {
            max-width: 1100px;
            margin: 50px auto;
            padding: 0 20px;
        }

        /* MAIN HEADING BRANDS: Applies the stylized upscale serif typographic features for the principal "SELDA" title text */
        .menu-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .menu-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4.2rem;
            font-weight: 300;
            color: var(--pure-white);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        .menu-header p {
            font-family: 'Montserrat', sans-serif;
            color: var(--subtle-gold);
            font-size: 0.95rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* TRADITIONAL PDF PROMPT STRIP: Generates a premium contrast bar offering traditional PDF layouts to users */
        .pdf-action-bar {
            background-color: var(--velvet-blue-surface);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            padding: 18px 24px;
            margin-bottom: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .pdf-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            color: var(--pure-white);
            letter-spacing: 1px;
            font-weight: 500;
        }
        .pdf-btn {
            display: inline-block;
            padding: 0.8rem 2rem;
            background-color: var(--subtle-gold); 
            color: var(--primary-dark);
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid var(--subtle-gold);
            transition: all 0.3s ease;
        }
        .pdf-btn:hover {
            background-color: transparent;
            color: var(--pure-white);
            border-color: rgba(255, 255, 255, 0.4);
        }

        /* CARDS & CATEGORIES DISPLAY blocks: Distinct surface backdrops partitioning food courses */
        .menu-section {
            margin-bottom: 50px;
            background: var(--velvet-blue-surface);
            padding: 45px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            color: var(--pure-white);
            margin: 0 0 35px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding-bottom: 8px;
            display: inline-block;
        }

        /* TWO-COLUMN GRID SETUP: Automatically lines up items into clean side-by-side balanced columns */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            column-gap: 45px;
            row-gap: 45px;
        }

        /* FOOD DISH CARDS LAYOUT: Structures image thumbnails side-by-side with text details */
        .menu-item {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        /* THUMBNAIL WRAPPERS: Cropper box that shapes plate pictures into standard small matching squares */
        .item-image-wrapper {
            width: 80px;
            height: 80px;
            flex-shrink: 0;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background-color: #1a2635;
        }
        .item-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        /* Zoom animation styling that smoothly activates when hovering dishes */
        .menu-item:hover .item-image {
            transform: scale(1.06);
        }

        /* DETAIL ALIGNMENT BLOCKS: Organizes price tags directly opposite dish titles nicely */
        .item-details {
            flex-grow: 1;
        }
        .item-top-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 6px;
        }
        .item-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.35rem;
            font-weight: 600;
            color: var(--pure-white);
            letter-spacing: 0.5px;
            line-height: 1.3;
        }
        .item-price {
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--subtle-gold);
            padding-left: 15px;
            white-space: nowrap;
        }
        .item-description {
            font-size: 0.9rem;
            color: var(--muted-white);
            line-height: 1.5;
        }

        .menu-footer-note {
            text-align: center;
            margin-top: 50px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            color: var(--muted-white);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* MOBILE FIXATION BUTTON BAR: Builds the sticky bottom mobile call-to-action tray mimicking index.html */
        .sticky-mobile-footer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 60px;
            background-color: #111B29;
            display: none;
            grid-template-columns: 1fr 1fr;
            z-index: 9999;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .sticky-action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--pure-white);
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
        }
        .sticky-action-btn:first-child {
            border-right: 1px solid var(--subtle-gold); 
        }

        /* OVERLAY ORDER CONSOLE: The sliding pop-up layer listing out delivery platforms on phones */
        .mobile-dropup-content {
            display: none;
            position: absolute;
            bottom: 60px;
            left: 0;
            width: 100%;
            background-color: #111B29;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            flex-direction: column;
            z-index: 10000;
        }
        .mobile-dropup-content.active {
            display: flex;
        }
        .mobile-dropup-item {
            padding: 1rem;
            color: var(--pure-white);
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        /* RESPONSIVE CSS MEDIA BREAKPOINTS: Instructs columns to break down safely on smaller mobile displays */
        @media (max-width: 850px) {
            .menu-grid {
                grid-template-columns: 1fr; /* Shifts from side-by-side into simple top-to-bottom cards on medium screens */
                row-gap: 35px;
            }
        }
        @media (max-width: 768px) {
            .sticky-mobile-footer { display: grid; } /* Reveals the floating reservation tray exclusively on small handheld screens */
            .menu-container { margin: 30px auto; }
            .menu-header h1 { font-size: 3.2rem; }
        }
        @media (max-width: 480px) {
            .pdf-action-bar {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            .menu-section { padding: 25px 20px; }
            .menu-item { gap: 15px; }
            .item-image-wrapper { width: 75px; height: 75px; }
            .item-name { font-size: 1.25rem; }
        }
    </style>
</head>
<body>

    <!-- VISUAL NAVBAR: Clean top-anchored layout block containing branding imagery and navigation pathways -->
    <header id="header">
        <div class="header-content">
            <a href="/" class="back-btn">
                <i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Back to Main Site
            </a>
            <a href="/" style="display: flex; align-items: center; text-decoration: none;">
              <img src="assets/IMG_8745.jpeg" alt="Selda Logo" style="height: 45px; width: auto; object-fit: contain;">
            </a>
        </div>
    </header>

    <div class="menu-container">
        <div class="menu-header">
            <h1>SELDA</h1>
            <p>Mediterranean Kitchen & Bar</p>
        </div>

        <!-- LINK BOX: Safely connects users trying to open a standard PDF layout copy alternative -->
        <div class="pdf-action-bar">
            <p class="pdf-text">Prefer to view a traditional copy?</p>
            <a href="assets/menu.pdf" target="_blank" class="pdf-btn">Open PDF Menu</a>
        </div>

        <!-- LIVE MENU DOM PLUG: The central landing container where Javascript appends all categorized dishes live -->
        <div id="live-menu-target"></div>
        
        <p class="menu-footer-note">Selda | San Antonio</p>
    </div>

    <!-- FLOATING UTILITY BLOCK: Displays shortcut order mechanics fixed directly to bottom system panels on mobile -->
    <div class="sticky-mobile-footer">
        <a href="#" id="mobile-order-trigger" class="sticky-action-btn">Order Online</a>
        
        <div class="mobile-dropup-content" id="mobile-dropup-menu">
            <a href="https://order.online/store/-30359031/" class="mobile-dropup-item" target="_blank">DoorDash</a>
            <a href="https://www.order.store/store/selda-mediterranean-kitchen/vRA9IbcYQw2GZyRaci0HGA" class="mobile-dropup-item" target="_blank">Uber Eats</a>
            <a href="https://seldasanantonio.dine.online" class="mobile-dropup-item" target="_blank">Grubhub</a>
            <a href="https://zingmyorder.com/restaurants/selda-mediterranean-9955-I-10-san-antonio-tx-78230-united-states" class="mobile-dropup-item" target="_blank">Zing My Order</a>
        </div>

        <a href="https://www.opentable.com/r/selda-mediterranean-kitchen-reservations-san-antonio?restref=1380571&lang=en-US&ot_source=Restaurant%20website" target="_blank" class="sticky-action-btn" style="background-color: var(--velvet-blue-surface);">Reserve Table</a>
    </div>

    <!-- INTERNAL INGESTION LINK: Imports the static arrays containing your prices, descriptions, and pictures -->
    <script src="data/menu.js"></script>

    <script>
        // DICTIONARY MAPPER: Maps short system internal keys into formatted titles printed onto the screens
        const sectionTitles = {
            salads: "salads",
            smallBites: "small bites...",
            aLittleMore: "a little more...",
            fromTheOven: "from the oven",
            desserts: "desserts"
        };

        const targetContainer = document.getElementById('live-menu-target');

        // REPETITION ENGINE: Loops over every category key found inside data/menu.js to map HTML blocks automatically
        for (const category in menuData) {
            if (menuData.hasOwnProperty(category)) {
                
                // Creates the enclosing outer structural page card container
                const sectionBlock = document.createElement('section');
                sectionBlock.className = 'menu-section';

                // Assigns and attaches clean category titles to section headers
                const heading = document.createElement('h2');
                heading.className = 'section-title';
                heading.innerText = sectionTitles[category] || category;
                sectionBlock.appendChild(heading);

                // Creates the grid container wrapper inside this section block
                const gridBlock = document.createElement('div');
                gridBlock.className = 'menu-grid';

                // SUB LOOP INTERACTION: Pulls out every specific plate item array and injects formatted card grids
                menuData[category].forEach(item => {
                    const itemElement = document.createElement('div');
                    itemElement.className = 'menu-item';
                    
                    // Fallback operator handling ensuring prices cleanly append standard currency characters ($)
                    const itemPriceDisplay = item.price.includes('$') ? item.price : `$${item.price}`;
                    
                    // The raw element card frame structure populated using JSON field entries
                    itemElement.innerHTML = `
                        <div class="item-image-wrapper">
                            <!-- onerror safety fallback hides the image frame gracefully if a picture fails to load -->
                            <img src="${item.image}" alt="${item.name}" class="item-image" loading="lazy" onerror="this.parentNode.style.display='none';">
                        </div>
                        <div class="item-details">
                            <div class="item-top-row">
                                <h3 class="item-name">${item.name}</h3>
                                <p class="item-price">${itemPriceDisplay}</p>
                            </div>
                            <p class="item-description">${item.description}</p>
                        </div>
                    `;
                    gridBlock.appendChild(itemElement);
                });

                // Attaches the grid and section to the main layout target container on the webpage
                sectionBlock.appendChild(gridBlock);
                targetContainer.appendChild(sectionBlock);
            }
        }

        /* STICKY INTERACTION FUNCTIONALITY: Triggers click interactions that reveal or hide delivery links on mobile displays */
        const orderTrigger = document.getElementById('mobile-order-trigger');
        const dropupMenu = document.getElementById('mobile-dropup-menu');

        if (orderTrigger && dropupMenu) {
            orderTrigger.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                dropupMenu.classList.toggle('active'); // Toggles panel visualization
            });

            // GLOBAL EVENT LISTENER: Safely collapses the overlay panel automatically if users tap outside the drawer frame
            document.addEventListener('click', (e) => {
                if (!dropupMenu.contains(e.target) && e.target !== orderTrigger) {
                    dropupMenu.classList.remove('active');
                }
            });
        }
    </script>
</body>
</html>
