<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selda Mediterranean Kitchen | San Antonio</title>
    
    <link rel="icon" href="assets/logo.jpg" type="image/jpeg">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Restaurant",
      "name": "Selda Mediterranean Kitchen | San Antonio",
      "url": "https://www.seldarestaurant.com/",
      "logo": "https://www.seldarestaurant.com/assets/logo.jpg"
    }
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Global Structural Overrides */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary-dark: #111111;
            --velvet-blue: #0A111C;        
            --velvet-blue-surface: #111B29;
            --pure-white: #FFFFFF;
            --muted-white: #BAC4D1;  
            --subtle-gold: #D4AF37;
        }
        
        body { font-family: 'Lato', sans-serif; background-color: var(--velvet-blue); color: var(--muted-white); line-height: 1.7; padding-bottom: 60px; }
        
        /* Header Menu Navigation Bar */
        header { background-color: var(--pure-white); padding: 1.2rem 0; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #EAEAEA; }
        .header-content { max-width: 1400px; margin: 0 auto; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; }
        nav { display: flex; gap: 2rem; align-items: center; }
        nav a { color: var(--primary-dark); text-decoration: none; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; transition: color 0.3s ease; }
        nav a:hover { color: #555555; }

        .desktop-dropdown { position: relative; display: inline-block; }
        .desktop-dropdown-btn { color: var(--primary-dark); text-decoration: none; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; background: none; border: none; cursor: pointer; font-family: 'Lato', sans-serif; display: flex; align-items: center; gap: 5px; padding: 0; }
        .desktop-dropdown-content { display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); background-color: var(--pure-white); min-width: 200px; box-shadow: 0px 8px 16px rgba(0,0,0,0.1); z-index: 101; margin-top: 1.2rem; border: 1px solid #EAEAEA; }
        .desktop-dropdown:hover .desktop-dropdown-content { display: flex; flex-direction: column; }
        .desktop-dropdown-content a { color: var(--primary-dark); padding: 0.8rem 1.2rem; text-decoration: none; display: block; font-size: 0.8rem; letter-spacing: 1px; border-bottom: 1px solid #F5F5F5; text-align: center; }
        .desktop-dropdown-content a:hover { background-color: #F9F9F9; color: var(--subtle-gold); }

        .hamburger { display: none; flex-direction: column; cursor: pointer; gap: 6px; }
        .hamburger span { width: 25px; height: 2px; background-color: var(--primary-dark); }

        /* Drawer Mobile Menu */
        .mobile-menu { display: flex; position: fixed; top: 70px; right: -60%; background-color: rgba(255, 255, 255, 0.98); width: 60%; height: calc(100vh - 70px); overflow-y: auto; flex-direction: column; padding: 2.5rem 1.5rem; gap: 1.5rem; border-left: 1px solid #EAEAEA; box-shadow: -10px 0px 30px rgba(0, 0, 0, 0.15); z-index: 1000; transition: right 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease; opacity: 0; pointer-events: none; }
        .mobile-menu.active { right: 0; opacity: 1; pointer-events: auto; }
        .mobile-menu a { color: var(--primary-dark); text-decoration: none; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        .mobile-dropdown-btn { background: none; border: none; color: var(--primary-dark); font-weight: 700; font-size: 1rem; text-align: left; padding: 0; cursor: pointer; display: flex; justify-content: space-between; align-items: center; width: 100%; font-family: 'Lato', sans-serif; text-transform: uppercase; letter-spacing: 1px; }
        .mobile-dropdown-content { display: none; flex-direction: column; gap: 1rem; padding-left: 1rem; margin-top: 0.5rem; border-left: 2px solid var(--primary-dark); }
        .mobile-dropdown-content.open { display: flex; }

        /* Updated Breakpoint: 1024px covers iPad and Tablets */
        @media (max-width: 1024px) {
          .hamburger { display: flex; }
          nav { display: none; }
          .sticky-mobile-footer { display: grid; }
          /* Add specific mobile adjustments as needed */
        }
        
        /* Hero and other sections remain as provided... */
        .hero-canvas-section { position: relative; background-image: url('assets/fire.jpg'); background-size: cover; padding: 4rem 1.5rem 2rem 1.5rem; text-align: center; display: flex; justify-content: center; align-items: center; }
        .hero-canvas-container { position: relative; z-index: 2; width: 100%; max-width: 580px; margin: 0 auto; }
        .brand-title-main { font-family: 'Cormorant Garamond', serif; font-size: 4.2rem; color: var(--pure-white); text-transform: uppercase; margin-bottom: 0.6rem; }
        
        .sticky-mobile-footer { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background-color: #111B29; display: none; grid-template-columns: 1fr 1fr; z-index: 9999; border-top: 1px solid rgba(255,255,255,0.1); }
        .sticky-action-btn { display: flex; align-items: center; justify-content: center; color: var(--pure-white); text-decoration: none; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <header id="header">
        <div class="header-content">
            <a href="/" style="display: flex; align-items: center; text-decoration: none;">
                <img src="assets/logo.jpg" alt="Selda Logo" style="height: 65px; width: auto; object-fit: contain;">
            </a>
            <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
            <nav>
                <a href="#about">About</a>
                <a href="#location-hours">Location & Hours</a>
                <a href="#menu">Menu</a>
                <div class="desktop-dropdown">
                    <button class="desktop-dropdown-btn">Order <i class="fas fa-chevron-down" style="font-size:0.7rem;"></i></button>
                    <div class="desktop-dropdown-content">
                        <a href="https://order.online/store/-30359031/" target="_blank">DoorDash</a>
                        <a href="https://www.order.store/store/selda-mediterranean-kitchen/vRA9IbcYQw2GZyRaci0HGA" target="_blank">Uber Eats</a>
                    </div>
                </div>
                <a href="#amenities">Hookah</a>
                <a href="#contact-section">Contact Us</a>
            </nav>
        </div>
        <div class="mobile-menu" id="mobile-menu">
            </div>
    </header>

    <script>
        // Your existing JavaScript logic remains exactly as it was.
    </script>
</body>
</html>
