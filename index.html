<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selda San Antonio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Global Structural Overrides */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary-dark: #111111;
            --velvet-blue: #0A111C;        
            --velvet-blue-surface: #111B29;
            --pure-white: #FFFFFF;
            --muted-white: #BAC4D1;  
            --subtle-gold: #D4AF37;
        }
        
        body { 
            font-family: 'Lato', sans-serif; 
            background-color: var(--velvet-blue); 
            color: var(--muted-white); 
            line-height: 1.7; 
            padding-bottom: 60px; 
        }
        
        /* Header Menu Navigation Bar */
        header {
            background-color: var(--pure-white); 
            padding: 1.2rem 0;
            position: sticky; 
            top: 0;
            z-index: 100; 
            border-bottom: 1px solid #EAEAEA;
        }
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav { display: flex; gap: 2rem; align-items: center; }
        nav a { color: var(--primary-dark); text-decoration: none; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; transition: color 0.3s ease; }
        nav a:hover { color: #555555; }

        /* Desktop Dropdown Container for Ordering Link */
        .desktop-dropdown {
            position: relative;
            display: inline-block;
        }
        .desktop-dropdown-btn {
            color: var(--primary-dark);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'Lato', sans-serif;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 0;
        }
        .desktop-dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--pure-white);
            min-width: 200px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.1);
            z-index: 101;
            margin-top: 1.2rem;
            border: 1px solid #EAEAEA;
        }
        .desktop-dropdown:hover .desktop-dropdown-content {
            display: flex;
            flex-direction: column;
        }
        .desktop-dropdown-content a {
            color: var(--primary-dark);
            padding: 0.8rem 1.2rem;
            text-decoration: none;
            display: block;
            font-size: 0.8rem;
            letter-spacing: 1px;
            border-bottom: 1px solid #F5F5F5;
            text-align: center;
            transition: background-color 0.2s ease;
        }
        .desktop-dropdown-content a:last-child { border-bottom: none; }
        .desktop-dropdown-content a:hover {
            background-color: #F9F9F9;
            color: var(--subtle-gold);
        }

        .hamburger { display: none; flex-direction: column; cursor: pointer; gap: 6px; }
        .hamburger span { width: 25px; height: 2px; background-color: var(--primary-dark); }

        /* ADVANCED RIGHT SIDE DRAWER MENU */
        .mobile-menu {
            display: flex;
            position: fixed;
            top: 70px;                    /* Sits perfectly right beneath the main navbar */
            right: -60%;                  /* Hidden completely off screen on the right side by default */
            background-color: rgba(255, 255, 255, 0.98); 
            width: 60%;                   /* Takes up just over half the screen widthwise */
            height: calc(100vh - 70px);   /* Stretches to the bottom of the device viewport screen */
            overflow-y: auto;             /* Internal scrolling enabled if dropdown items are opened */
            -webkit-overflow-scrolling: touch; 
            flex-direction: column;
            padding: 2.5rem 1.5rem;
            gap: 1.5rem;
            border-left: 1px solid #EAEAEA;
            box-shadow: -10px 0px 30px rgba(0, 0, 0, 0.15); 
            z-index: 1000;
            transition: right 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease; /* Smooth slide-in and translucent fade */
            opacity: 0;
            pointer-events: none;         /* Blocks user accidental clicks while hidden */
        }
        
        /* Slide drawer out when active */
        .mobile-menu.active { 
            right: 0; 
            opacity: 1;
            pointer-events: auto;
        } 

        /* Translucent state activated via scrolling JavaScript handler */
        .mobile-menu.translucent {
            opacity: 0.35 !important;      /* Makes it nicely see-through when they scroll background page */
        }
        .mobile-menu.translucent:hover,
        .mobile-menu.translucent:focus-within {
            opacity: 1 !important;         /* Instantly returns to full solid bright white if they touch it */
        }

        .mobile-menu a { color: var(--primary-dark); text-decoration: none; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        .mobile-dropdown-btn {
            background: none;
            border: none;
            color: var(--primary-dark);
            font-weight: 700;
            font-size: 1rem;
            text-align: left;
            padding: 0;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            font-family: 'Lato', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .mobile-dropdown-btn i { transition: transform 0.3s ease; }
        .mobile-dropdown-btn.active i { transform: rotate(180deg); }
        .mobile-dropdown-content {
            display: none;
            flex-direction: column;
            gap: 1rem;
            padding-left: 1rem;
            margin-top: 0.5rem;
            border-left: 2px solid var(--primary-dark);
        }
        .mobile-dropdown-content.open { display: flex; }
        .mobile-dropdown-content a { font-size: 0.95rem; font-weight: 600; color: #555555; }

        /* Mobile Hamburger Horizontal Icons Layout Row */
        .mobile-social-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 0.5rem;
            padding-top: 0.5rem;
        }
        .mobile-social-row a {
            font-size: 1.3rem;
            color: var(--primary-dark);
            transition: opacity 0.2s ease;
        }
        .mobile-social-row a:hover {
            opacity: 0.6;
        }

        /* ==========================================================================
           HERO CANVAS SECTION
           ========================================================================= */
        .hero-canvas-section {
            position: relative;
            background-image: url('assets/fire.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding: 4rem 1.5rem 2rem 1.5rem;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .hero-canvas-section::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, rgba(10,17,28,0.7) 0%, rgba(10,17,28,0.85) 100%);
            z-index: 1;
        }
        .hero-canvas-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 580px;
            margin: 0 auto;
        }
        .brand-title-main {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4.2rem;
            font-weight: 300;
            color: var(--pure-white);
            letter-spacing: 6px;
            line-height: 1;
            text-transform: uppercase;
            margin-bottom: 0.6rem;
        }
        .brand-subtitle-tags {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--pure-white);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        .brand-location-tag {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--subtle-gold);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 1.8rem;
        }
        .brand-description-paragraph {
            font-family: 'Lato', sans-serif;
            font-size: 1.05rem;
            font-weight: 400;
            color: var(--muted-white);
            line-height: 1.6;
            margin-bottom: 1.8rem;
            padding: 0 0.5rem;
        }

        /* Constraints the Iframe Frame to Prevent Extra Layout Leakage */
        .clean-widget-wrap {
            width: 100%;
            margin: 0 auto;
            max-height: 330px; 
            overflow: hidden;
        }
        
        /* Pulls Book Now text flush up beneath widget layout */
        .widget-sub-label-wrap {
            margin-top: -12px !important; 
            position: relative;
            z-index: 5;
        }

        /* Editorial Content Full Strips */
        .editorial-section {
            position: relative;
            height: 70vh;
            min-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .editorial-section::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, rgba(10,17,28,0.55) 0%, rgba(10,17,28,0.8) 100%);
            z-index: 1;
        }
        .editorial-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 500px;
            padding: 0 1.5rem;
        }
        .editorial-section h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4rem;
            font-weight: 400;
            color: var(--pure-white);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 1.5rem;
            line-height: 1.1;
        }

        /* Gold-Themed Action Buttons */
        .btn-editorial {
            display: inline-block;
            padding: 1.2rem 3rem;
            background-color: var(--subtle-gold); 
            color: var(--primary-dark);
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid var(--subtle-gold);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .btn-editorial:hover {
            background-color: transparent;
            color: var(--pure-white);
            border-color: rgba(255, 255, 255, 0.4);
        }

        /* Multi-Platform Order Button Grid styling */
        .order-platforms-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 320px;
            margin: 0 auto;
        }
        .btn-platform {
            display: block;
            padding: 1rem 2rem;
            background-color: transparent;
            color: var(--pure-white);
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            text-align: center;
        }
        .btn-platform:hover {
            background-color: var(--subtle-gold);
            color: var(--primary-dark);
            border-color: var(--subtle-gold);
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 2rem; }
        section.standard-padding { padding: 6rem 0; }
        
        .section-title { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 3.5rem; 
            font-weight: 400;
            text-align: center; 
            margin-bottom: 2.5rem; 
            color: var(--pure-white); 
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ==========================================================================
           DYNAMIC MENU STYLING (FOR INDEX.HTML)
           ========================================================================= */
        #index-menu-target {
            max-width: 1100px;
            margin: 0 auto;
        }
        .index-menu-category {
            margin-bottom: 60px;
        }
        .index-category-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            color: var(--pure-white);
            margin: 0 0 35px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding-bottom: 8px;
            display: inline-block;
        }
        .index-menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            column-gap: 45px;
            row-gap: 45px;
        }
        .index-menu-item {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        .index-item-image-wrapper {
            width: 100px;
            height: 100px;
            flex-shrink: 0;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background-color: #1a2635;
        }
        .index-item-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .index-item-details {
            flex-grow: 1;
        }
        .index-item-top-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 6px;
        }
        .index-item-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--pure-white);
            line-height: 1.2;
        }
        .index-item-price {
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--subtle-gold);
            white-space: nowrap;
        }
        .index-item-description {
            font-size: 0.95rem;
            color: var(--muted-white);
        }

        .amenities-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
        .amenity-card { 
            background: var(--velvet-blue-surface); 
            padding: 3.5rem 2rem; 
            text-align: center; 
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .amenity-card h3 {
            font-family: 'Cormorant Garamond', serif;
            color: var(--pure-white);
            font-size: 2rem;
            margin-bottom: 1rem;
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .scrolling-ticker { 
            background: var(--velvet-blue-surface); 
            color: var(--pure-white); 
            overflow: hidden; 
            white-space: nowrap; 
            padding: 1.2rem 0; 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            width: 100%; 
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .ticker-content { display: inline-block; animation: marquee 25s linear infinite; }
        .ticker-content span { margin-right: 4rem; font-family: 'Montserrat', sans-serif; font-weight: 600; }
        @keyframes marquee { 0% { transform: translate3d(0,0,0); } 100% { transform: translate3d(-50%,0,0); } }

        .carousel-container {
          position: relative !important;
          width: 100% !important;
          max-width: 800px !important; 
          height: 500px !important;    
          margin: 0 auto 1.5rem auto !important; 
          overflow: hidden !important; 
          border: 1px solid rgba(255, 255, 255, 0.1);
          touch-action: pan-y; 
          user-select: none;
        }
        .carousel-track {
          display: flex !important;    
          flex-direction: row !important;
          width: 100% !important;
          height: 100% !important;
          transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1) !important; 
        }
        .carousel-slide { min-width: 100% !important; width: 100% !important; height: 100% !important; flex-shrink: 0 !important; }
        .carousel-slide img { width: 100% !important; height: 100% !important; object-fit: cover !important; display: block !important; }
        .carousel-btn {
          position: absolute !important;
          top: 50% !important;
          transform: translateY(-50%) !important;
          background-color: rgba(10, 17, 28, 0.8) !important;
          color: var(--pure-white) !important;
          border: 1px solid rgba(255, 255, 255, 0.1) !important;
          width: 45px !important; height: 45px !important;
          cursor: pointer !important; font-size: 14px !important; border-radius: 50% !important;
          display: flex !important; align-items: center !important; justify-content: center !important;
          z-index: 10 !important; transition: all 0.3s ease;
        }
        .carousel-btn:hover { background-color: var(--pure-white) !important; color: var(--velvet-blue) !important; }
        .prev-btn { left: 15px !important; }
        .next-btn { right: 15px !important; }
        .carousel-dots { position: absolute !important; bottom: 15px !important; left: 50% !important; transform: translateX(-50%) !important; display: flex !important; gap: 8px !important; z-index: 10 !important; }
        .dot { width: 6px !important; height: 6px !important; background-color: rgba(255, 255, 255, 0.3) !important; border-radius: 50% !important; cursor: pointer !important; transition: all 0.3s ease; }
        .dot.active { background-color: var(--pure-white) !important; transform: scale(1.3) !important; }
        .carousel-caption-bar { text-align: center; font-family: 'Montserrat', sans-serif; font-size: 0.9rem; font-weight: 600; color: var(--pure-white); letter-spacing: 2px; text-transform: uppercase; margin: 0 auto 2.5rem auto; min-height: 1.5rem; }

        /* Mobile Layout Modifications */
        .sticky-mobile-footer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 60px;
            background-color: #111B29;
            display: none;
            grid-template-columns: 1fr 1fr;
            z-index: 9999;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .sticky-action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--pure-white);
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
        }
        .sticky-action-btn:first-child {
            border-right: 1px
