<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selda Mediterranean Kitchen & Bar | Authentic Turkish Mediterranean Cuisine</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    /* --- Premium Brand Style Guide --- */
    :root {
      --bg-light: #ffffff;
      --bg-alt: #fcfbfa;
      --charcoal: #111111;
      --text-muted: #666666;
      --gold: #dfb15b;
      --gold-hover: #c99e4b;
      --border-color: #e5e5e5;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      background-color: var(--bg-light);
      color: var(--charcoal);
      line-height: 1.6;
    }

    /* --- Universal Helper Classes --- */
    .section {
      padding: 100px 5% 80px 5%;
      text-align: center;
    }
    
    .section.alt {
      background-color: var(--bg-alt);
      border-top: 1px solid var(--border-color);
      border-bottom: 1px solid var(--border-color);
    }

    .section-container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-subtitle {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--gold);
      display: block;
      margin-bottom: 10px;
      font-weight: 600;
    }

    h2 {
      font-family: 'Cinzel', serif;
      font-size: 36px;
      font-weight: 400;
      letter-spacing: 2px;
      color: var(--charcoal);
    }

    .accent-line {
      width: 50px;
      height: 2px;
      background-color: var(--gold);
      margin: 20px auto 40px auto;
    }

    /* --- Premium Header & Buttons --- */
    header {
      background-color: var(--charcoal);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 25px 5%;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 2px solid var(--gold);
    }

    .logo {
      font-family: 'Cinzel', serif;
      font-size: 26px;
      font-weight: 600;
      letter-spacing: 4px;
      color: var(--gold);
    }

    .cta {
      display: flex;
      gap: 15px;
    }

    .btn {
      display: inline-block;
      padding: 12px 24px;
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 2px;
      text-decoration: none;
      transition: all 0.3s ease;
      border-radius: 0px;
    }

    .btn.primary {
      background-color: var(--gold);
      color: var(--charcoal);
    }

    .btn.primary:hover {
      background-color: var(--gold-hover);
    }

    .btn.secondary {
      border: 1px solid #ffffff;
      color: #ffffff;
    }

    .btn.secondary:hover {
      background-color: #ffffff;
      color: var(--charcoal);
    }

    /* --- Our Story Section --- */
    .lead-text {
      max-width: 750px;
      margin: 0 auto;
      font-size: 18px;
      font-weight: 300;
      color: #444444;
      line-height: 1.8;
      letter-spacing: 0.5px;
    }

    /* --- Featured Dishes Section --- */
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      justify-content: center;
      margin-top: 20px;
    }

    .img-wrapper {
      position: relative;
      width: 100%;
      max-width: 340px;
      height: 380px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    .img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .img-wrapper:hover img {
      transform: scale(1.06);
    }

    .img-caption {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      color: #ffffff;
      padding: 30px 20px 20px 20px;
      font-family: 'Cinzel', serif;
      font-size: 18px;
      letter-spacing: 1px;
      text-align: left;
    }

    /* --- Luxury Locations Cards --- */
    .locations-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      justify-content: center;
    }

    .card {
      background: #ffffff;
      border: 1px solid var(--border-color);
      width: 100%;
      max-width: 340px;
      padding: 40px 30px;
      text-align: left;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 5px 20px rgba(0,0,0,0.02);
    }

    .card.highlight {
      border: 1px solid var(--gold);
    }

    .card-badge {
      position: absolute;
      top: -12px;
      left: 30px;
      background-color: var(--gold);
      color: var(--charcoal);
      font-size: 10px;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 2px;
      padding: 4px 12px;
    }

    .card h3 {
      font-family: 'Cinzel', serif;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 20px;
      color: var(--charcoal);
    }

    .address, .phone {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 15px;
      font-weight: 400;
    }

    .phone {
      margin-bottom: 35px;
      font-weight: 500;
      color: var(--charcoal);
    }

    .card-links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card-btn {
      display: block;
      text-align: center;
      padding: 12px;
      font-size: 11px;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 2px;
      text-decoration: none;
      border: 1px solid var(--charcoal);
      color: var(--charcoal);
      transition: all 0.3s ease;
    }

    .card-btn:hover {
      background-color: var(--charcoal);
      color: #ffffff;
    }

    .card-btn.primary-card-btn {
      background-color: var(--gold);
      border-color: var(--gold);
      color: var(--charcoal);
    }

    .card-btn.primary-card-btn:hover {
      background-color: var(--charcoal);
      color: var(--gold);
      border-color: var(--charcoal);
    }

    /* --- Minimal Online Ordering Blocks --- */
    .order-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      margin-top: 20px;
    }
